name: NPM Package Publish

on:
  push:
    branches:
      - main
      - next
      - alpha

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check if version has been updated
        id: check
        uses: EndBug/version-check@095362f3cd50f690c8fa0e6afeea81834bd8d320 # v3.0.0

      - name: Setup Node
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install Dependencies
        if: steps.check.outputs.changed == 'true'
        run: npm ci

      - name: Lint + Format Check
        if: steps.check.outputs.changed == 'true'
        run: npm run check

      - name: Run Unit Tests + Coverage
        if: steps.check.outputs.changed == 'true'
        run: npm run test:cov

      - name: Publish
        if: steps.check.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          gitBranch=${GITHUB_REF##*/}
          publishFlag=$(if [ "$GITHUB_REF" != 'refs/heads/main' ]; then eval echo '--tag $gitBranch'; else echo ''; fi;)
          echo "PACKAGE_VERSION=$(cat package.json | jq -r '.version')" >> $GITHUB_ENV
          npm publish $publishFlag

      - name: Upload Coverage
        if: steps.check.outputs.changed == 'true'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODE_COV }}

      - name: Create Release
        if: github.ref == 'refs/heads/main' && steps.check.outputs.changed == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: v${{ env.PACKAGE_VERSION }}
          draft: false
          prerelease: false
